services:
  - type: web
    name: ground2tech-report-generator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false
